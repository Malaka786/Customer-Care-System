<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submit Ticket - Customer Support System</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<header>
  <h1>Submit Support Ticket</h1>
</header>

<section class="form-container">
  <form id="ticketForm">
    <label for="ticketTitle">Ticket Title:</label>
    <input type="text" id="ticketTitle" name="ticketTitle" required>

    <label for="ticketDescription">Ticket Description:</label>
    <textarea id="ticketDescription" name="ticketDescription" rows="4" required></textarea>

    <label for="ticketCategory">Category:</label>
    <select id="ticketCategory" name="ticketCategory" required>
      <option value="Technical Support">Technical Support</option>
      <option value="Billing Issues">Billing Issues</option>
      <option value="Account Issues">Account Issues</option>
    </select>

    <button type="submit">Submit Ticket</button>
  </form>
</section>

<footer>
  <p>&copy; 2025 Customer Support System. All Rights Reserved.</p>
</footer>

<script>
  document.getElementById('ticketForm').addEventListener('submit', function(event) {
    event.preventDefault(); // Prevent default form submission

    const title = document.getElementById('ticketTitle').value;
    const description = document.getElementById('ticketDescription').value;
    const category = document.getElementById('ticketCategory').value;

    // AJAX call to submit the ticket
    fetch('/tickets/submit', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        title: title,
        description: description,
        category: category
      })
    })
            .then(response => response.json())
            .then(data => {
              alert('Ticket submitted successfully!');
              // Optionally, clear the form or redirect the user to another page
              document.getElementById('ticketForm').reset();
            })
            .catch(error => {
              alert('Error submitting ticket: ' + error);
            });
  });
</script>
</body>
</html>
