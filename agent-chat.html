<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agent Chat Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); margin:0; min-height:100vh; display:flex; }
        .container { flex:1; display:grid; grid-template-columns:300px 1fr; gap:2rem; padding:2rem; }
        .sidebar { background:white; border-radius:16px; padding:1rem; box-shadow:0 10px 30px rgba(0,0,0,0.1); overflow-y:auto; }
        .session-item { padding:1rem; border:1px solid #e2e8f0; border-radius:10px; margin-bottom:0.5rem; cursor:pointer; transition:0.3s; position:relative; }
        .session-item:hover { background:#edf2f7; }
        .session-status { display:inline-block; padding:0.25rem 0.5rem; border-radius:6px; font-size:0.75rem; margin-left:0.5rem; }
        .status-waiting { background:#fef3c7; color:#92400e; }
        .status-active { background:#d1fae5; color:#065f46; }
        .delete-btn { position:absolute; right:0.5rem; top:0.5rem; background:#ef4444; color:white; border:none; padding:0.25rem 0.5rem; border-radius:6px; cursor:pointer; font-size:0.75rem; }
        .delete-btn:hover { background:#dc2626; }
        .main-content { background:white; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.1); display:flex; flex-direction:column; overflow:hidden; }
        .chat-header { padding:1.5rem; border-bottom:1px solid #e2e8f0; background:#f7fafc; }
        .chat-window { flex:1; padding:1.5rem; overflow-y:auto; background:#f7fafc; display:flex; flex-direction:column; gap:1rem; }
        .message { max-width:70%; padding:1rem 1.5rem; border-radius:18px; font-size:0.95rem; line-height:1.5; animation:fadeIn 0.3s ease; margin-bottom:0.5rem; }
        .message-sender { font-size:0.75rem; font-weight:600; margin-bottom:0.25rem; opacity:0.8; }
        .message-content { word-wrap: break-word; }
        .edited-indicator { font-size:0.7rem; opacity:0.7; font-style:italic; color:#718096; }
        .user-message { align-self:flex-end; background:#667eea; color:white; }
        .agent-message { align-self:flex-start; background:white; border:1px solid #e2e8f0; color:#2d3748; }
        .system-message { align-self:center; background:#edf2f7; padding:0.75rem 1rem; border-radius:16px; font-style:italic; }
        .chat-input { border-top:1px solid #e2e8f0; padding:1rem; background:white; display:flex; gap:1rem; }
        .message-input { flex:1; border:2px solid #e2e8f0; border-radius:10px; padding:1rem; resize:none; }
        .send-button { padding:1rem 1.5rem; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; border:none; border-radius:12px; cursor:pointer; font-weight:600; }
        @keyframes fadeIn { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <h3>All Chat Sessions</h3>
        <div id="sessionList">
            <div th:each="chatSession : ${agentSessions}" class="session-item"
                 th:data-session-id="${chatSession.sessionId}"
                 th:data-username="${chatSession.user.username}"
                 th:data-status="${chatSession.status}">
                <button class="delete-btn">Delete</button>
                <strong th:text="${chatSession.user.username}">User</strong>
                <span class="session-status" 
                      th:classappend="${chatSession.status.toString() == 'WAITING' ? 'status-waiting' : 'status-active'}" 
                      th:text="${chatSession.status}">Status</span>
                <div style="font-size:0.8rem; color:#718096; margin-top:0.25rem;" 
                     th:text="'ID: ' + ${chatSession.sessionId}">Session ID</div>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-header"><h2 id="chatTitle">Select a Session</h2></div>
        <div id="chatWindow" class="chat-window"><div class="system-message">No chat selected</div></div>
        <div class="chat-input">
            <textarea id="messageInput" class="message-input" placeholder="Type a message..."></textarea>
            <button class="send-button" onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>

<script th:inline="javascript">
    const agentId = /*[[${agentId}]]*/ 1;
    let stompClient = null;
    let isConnected = false;
    let currentSessionId = null;

    function connect() {
        const socket = new SockJS('/chat');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, frame => {
            console.log('✅ WebSocket Connected: ' + frame);
            isConnected = true;

            // ✅ Listen for new user sessions
            stompClient.subscribe('/topic/sessions', msg => {
                console.log('📨 New session received:', msg.body);
                const session = JSON.parse(msg.body);
                addNewSession(session);
            });
        }, error => {
            console.error('❌ WebSocket connection error:', error);
            isConnected = false;
            // Retry connection after 3 seconds
            setTimeout(connect, 3000);
        });
    }

    function addNewSession(session) {
        const list = document.getElementById('sessionList');
        const div = document.createElement('div');
        div.className = 'session-item';
        div.setAttribute('data-session-id', session.sessionId);
        div.setAttribute('data-username', session.username);
        div.setAttribute('data-status', session.status);
        
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.textContent = 'Delete';
        deleteBtn.onclick = (e) => deleteSession(session.sessionId, e);
        
        const username = document.createElement('strong');
        username.textContent = session.username;
        
        const statusSpan = document.createElement('span');
        statusSpan.className = 'session-status ' + (session.status === 'WAITING' ? 'status-waiting' : 'status-active');
        statusSpan.textContent = session.status;
        
        const sessionInfo = document.createElement('div');
        sessionInfo.style.fontSize = '0.8rem';
        sessionInfo.style.color = '#718096';
        sessionInfo.style.marginTop = '0.25rem';
        sessionInfo.textContent = 'ID: ' + session.sessionId;
        
        div.appendChild(deleteBtn);
        div.appendChild(username);
        div.appendChild(statusSpan);
        div.appendChild(sessionInfo);
        div.onclick = () => selectSession(session.sessionId, session.username);
        
        list.insertBefore(div, list.firstChild);
    }

    function selectSession(sessionId, username) {
        console.log('🔍 Selecting session:', sessionId, 'for user:', username);
        currentSessionId = sessionId;
        document.getElementById('chatTitle').textContent = 'Chat with ' + username;

        // Load chat history first
        loadChatHistory(sessionId);
        
        // Unsubscribe from previous session if any
        if (window.currentSubscription) {
            console.log('🔌 Unsubscribing from previous session');
            window.currentSubscription.unsubscribe();
        }
        
        // Subscribe to new session messages
        if (isConnected && stompClient) {
            console.log('📡 Subscribing to /topic/chat/' + sessionId);
            window.currentSubscription = stompClient.subscribe('/topic/chat/' + sessionId, msg => {
                console.log('📩 New message received:', msg.body);
                displayMessage(JSON.parse(msg.body));
            });
        } else {
            console.warn('⚠️ WebSocket not connected, cannot subscribe to messages');
        }

        // Notify backend to mark session active
        console.log('🔔 Assigning agent to session');
        fetch('/api/chat/assign-agent?sessionId=' + sessionId + '&agentId=' + agentId, {method:'POST'})
            .then(res => res.json())
            .then(data => console.log('✅ Agent assigned:', data))
            .catch(err => console.error('❌ Error assigning agent:', err));
    }

    function loadChatHistory(sessionId) {
        console.log('📖 Loading chat history for session:', sessionId);
        const url = '/api/chat/history/' + sessionId;
        console.log('🌐 Fetching from URL:', url);
        
        fetch(url)
            .then(res => {
                console.log('📡 Response status:', res.status, res.statusText);
                if (!res.ok) {
                    throw new Error('Failed to load chat history: ' + res.status);
                }
                return res.json();
            })
            .then(messages => {
                console.log('📨 Received messages:', messages.length, 'messages');
                console.log('Messages data:', messages);
                const chatWindow = document.getElementById('chatWindow');
                chatWindow.innerHTML = '';
                if (messages.length === 0) {
                    console.log('ℹ️ No messages found, showing empty state');
                    chatWindow.innerHTML = '<div class="system-message">No messages yet. Start the conversation!</div>';
                } else {
                    console.log('✅ Displaying', messages.length, 'messages');
                    messages.forEach((msg, index) => {
                        console.log('Message', index + 1, ':', msg);
                        displayMessage(msg);
                    });
                }
                scrollToBottom();
            })
            .catch(error => {
                console.error('❌ Error loading chat history:', error);
                const chatWindow = document.getElementById('chatWindow');
                chatWindow.innerHTML = '<div class="system-message">Error loading chat history: ' + error.message + '</div>';
            });
    }

    function displayMessage(message) {
        console.log('💬 Displaying message:', message);
        
        // Check if message is deleted (strict check)
        if (message.isDeleted === true) {
            console.log('  → Message is deleted, removing from DOM');
            // Find and remove the message from DOM if it exists
            const existingMsg = document.querySelector(`[data-message-id="${message.id}"]`);
            if (existingMsg) {
                existingMsg.remove();
                console.log('  → Deleted message removed');
            }
            return;
        }

        // Check if message already exists (for edit updates)
        const existingMsg = document.querySelector(`[data-message-id="${message.id}"]`);
        if (existingMsg) {
            console.log('  → Message exists, updating content');
            // Update existing message
            const contentDiv = existingMsg.querySelector('.message-content');
            if (contentDiv) {
                // Remove old edited indicator if exists
                const oldIndicator = contentDiv.querySelector('.edited-indicator');
                if (oldIndicator) {
                    oldIndicator.remove();
                }
                
                contentDiv.textContent = message.content;
                
                // Add edited indicator if needed
                if (message.isEdited) {
                    const indicator = document.createElement('span');
                    indicator.classList.add('edited-indicator');
                    indicator.textContent = ' (edited)';
                    contentDiv.appendChild(indicator);
                }
                console.log('  → Message updated');
            }
            return;
        }

        // Create new message
        const chatWindow = document.getElementById('chatWindow');
        const messageContainer = document.createElement('div');
        messageContainer.classList.add('message');
        messageContainer.setAttribute('data-message-id', message.id);
        
        // From agent's perspective: USER messages on left, AGENT messages on right
        if (message.senderType === 'USER') {
            messageContainer.classList.add('agent-message'); // Customer messages on LEFT
            console.log('  → Customer message (left)');
        } else if (message.senderType === 'AGENT') {
            messageContainer.classList.add('user-message'); // Agent messages on RIGHT
            console.log('  → Agent message (right)');
        } else {
            messageContainer.classList.add('system-message');
            messageContainer.textContent = message.content;
            chatWindow.appendChild(messageContainer);
            scrollToBottom();
            console.log('  → System message (center)');
            return;
        }
        
        // Add sender name
        const senderName = document.createElement('div');
        senderName.classList.add('message-sender');
        senderName.textContent = message.senderUsername || (message.senderType === 'USER' ? 'Customer' : 'Agent');
        console.log('  → Sender:', senderName.textContent);
        
        // Add message content
        const messageContent = document.createElement('div');
        messageContent.classList.add('message-content');
        messageContent.textContent = message.content;
        
        // Add edited indicator if message was edited
        if (message.isEdited) {
            const editedIndicator = document.createElement('span');
            editedIndicator.classList.add('edited-indicator');
            editedIndicator.textContent = ' (edited)';
            messageContent.appendChild(editedIndicator);
            console.log('  → Added edited indicator');
        }
        
        console.log('  → Content:', message.content);
        
        messageContainer.appendChild(senderName);
        messageContainer.appendChild(messageContent);
        chatWindow.appendChild(messageContainer);
        scrollToBottom();
    }

    function sendMessage() {
        const msgInput = document.getElementById('messageInput');
        const msg = msgInput.value.trim();
        if (!msg || !isConnected || !currentSessionId) return;

        stompClient.send('/app/chat.send', {}, JSON.stringify({
            sessionId: currentSessionId,
            senderId: agentId,
            content: msg,
            senderType: 'AGENT'
        }));
        msgInput.value = '';
    }

    function scrollToBottom() {
        const chatWindow = document.getElementById('chatWindow');
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    function deleteSession(sessionId, event) {
        console.log('🗑️ deleteSession called for:', sessionId);
        
        if (event) {
            event.stopPropagation(); // Prevent triggering selectSession
            event.preventDefault();
        }
        
        if (!confirm('Are you sure you want to delete this chat session?')) {
            console.log('❌ Deletion cancelled by user');
            return;
        }
        
        console.log('🔄 Sending DELETE request for session:', sessionId);
        
        fetch('/api/chat/session/' + sessionId, {
            method: 'DELETE'
        })
        .then(res => {
            console.log('📡 DELETE response status:', res.status);
            return res.json();
        })
        .then(data => {
            console.log('📨 DELETE response data:', data);
            if (data.success) {
                console.log('✅ Session deleted successfully');
                
                // Remove from UI
                const sessionItems = document.querySelectorAll('.session-item');
                sessionItems.forEach(item => {
                    if (item.getAttribute('data-session-id') === sessionId) {
                        console.log('🧹 Removing session from UI:', sessionId);
                        item.remove();
                    }
                });
                
                // If this was the active chat, clear it
                if (currentSessionId === sessionId) {
                    console.log('🧹 Clearing active chat');
                    currentSessionId = null;
                    document.getElementById('chatTitle').textContent = 'Select a Session';
                    document.getElementById('chatWindow').innerHTML = '<div class="system-message">No chat selected</div>';
                }
                
                alert('Session deleted successfully!');
            } else {
                console.error('❌ Delete failed:', data.message);
                alert('Error deleting session: ' + data.message);
            }
        })
        .catch(err => {
            console.error('❌ Error during delete request:', err);
            alert('Error deleting session: ' + err.message);
        });
    }

    // Add click handlers to session items after page load
    document.addEventListener('DOMContentLoaded', () => {
        attachSessionHandlers();
    });

    function attachSessionHandlers() {
        console.log('🔧 Attaching session handlers...');
        const items = document.querySelectorAll('.session-item');
        console.log('Found', items.length, 'session items');
        
        items.forEach((item, index) => {
            const sessionId = item.getAttribute('data-session-id');
            const username = item.getAttribute('data-username');
            console.log('Attaching handlers to session', index + 1, ':', sessionId, '-', username);
            
            // Delete button handler FIRST (higher priority)
            const deleteBtn = item.querySelector('.delete-btn');
            if (deleteBtn) {
                // Remove any existing onclick to prevent duplicates
                deleteBtn.onclick = null;
                
                deleteBtn.onclick = (e) => {
                    console.log('🗑️ Delete button clicked for session:', sessionId);
                    e.stopPropagation();
                    e.preventDefault();
                    deleteSession(sessionId, e);
                };
                console.log('  ✅ Delete button handler attached');
            } else {
                console.warn('  ⚠️ Delete button not found in session item');
            }
            
            // Click handler for session selection
            item.onclick = (e) => {
                // Don't select if clicking delete button
                if (e.target.classList.contains('delete-btn')) {
                    console.log('  ⏭️ Ignoring click on delete button');
                    return;
                }
                console.log('📋 Session item clicked:', sessionId);
                selectSession(sessionId, username);
            };
            console.log('  ✅ Session click handler attached');
        });
        
        console.log('✅ All handlers attached');
    }

    connect();
</script>
</body>
</html>
