<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Customer Support System</title>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      color: #333;
    }
    header, footer { text-align: center; padding: 1.5rem; }
    footer { background: rgba(45,55,72,0.95); color: white; margin-top: auto; }
    h1 {
      background: linear-gradient(135deg, #667eea, #764ba2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-size: 2.3rem;
      font-weight: 700;
    }
    .register-card {
      background: white;
      border-radius: 20px;
      padding: 2.5rem;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      max-width: 600px;
      margin: 3rem auto;
      width: 90%;
    }
    label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
    input {
      width: 100%; padding: 1rem; border: 2px solid #e2e8f0; border-radius: 10px;
      background: #f7fafc; font-size: 1rem; transition: 0.3s;
    }
    input:focus {
      border-color: #667eea; background: white;
      box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
    }
    button {
      width: 100%; padding: 1rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white; border: none; border-radius: 10px;
      font-size: 1.1rem; cursor: pointer; margin-top: 1rem;
      box-shadow: 0 10px 30px rgba(102,126,234,0.4);
      transition: 0.3s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 15px 40px rgba(102,126,234,0.5); }
    .alert-error {
      background: #fed7d7; color: #742a2a;
      padding: 1rem; border-radius: 10px; margin-bottom: 1rem;
      font-weight: 600; text-align: center;
    }
    .form-footer { text-align: center; margin-top: 2rem; font-size: 0.95rem; }
    .form-footer a { color: #667eea; text-decoration: none; font-weight: 600; }
    .field-error {
      color: #e53e3e;
      font-size: 0.875rem;
      margin-top: 0.25rem;
      font-weight: 500;
    }
    .form-group {
      margin-bottom: 1.5rem;
    }
  </style>
</head>

<body>
<header>
  <nav>
    <a href="/">🏠 Home</a> |
    <a href="/login">🔑 Login</a> |
    <a href="/register">📝 Register</a>
  </nav>
  <h1>Customer Support System - Register</h1>
</header>

<section>
  <div class="register-card">
    <h2 style="text-align:center;">Create Account</h2>
    <p style="text-align:center;color:#718096;">Join us to access customer support services</p>

    <!-- ✅ Server-side error message -->
    <div th:if="${error}" class="alert-error" th:text="${error}"></div>

    <form id="registerForm" action="/auth/register" method="POST" th:object="${user}">
      <!-- CSRF Token for security -->
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      
      <div class="form-group">
        <label for="username">Username:</label>
        <input type="text" id="username" th:field="*{username}" required minlength="3" maxlength="100" placeholder="Enter username">
        <div th:if="${#fields.hasErrors('username')}" class="field-error" th:errors="*{username}"></div>
      </div>

      <div class="form-group">
        <label for="phoneNumber">Phone Number:</label>
        <input type="text" id="phoneNumber" th:field="*{phoneNumber}" required pattern="\d{10}" placeholder="Enter 10-digit number">
        <div th:if="${#fields.hasErrors('phoneNumber')}" class="field-error" th:errors="*{phoneNumber}"></div>
      </div>

      <div class="form-group">
        <label for="address">Address:</label>
        <input type="text" id="address" th:field="*{address}" required minlength="3" maxlength="255" placeholder="Enter address">
        <div th:if="${#fields.hasErrors('address')}" class="field-error" th:errors="*{address}"></div>
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input type="password" id="password" th:field="*{password}" required minlength="6" placeholder="Enter password">
        <div th:if="${#fields.hasErrors('password')}" class="field-error" th:errors="*{password}"></div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm password">
      </div>

      <button type="submit">Register</button>
    </form>

    <div class="form-footer">
      <p>Already have an account? <a href="/login">Login here</a></p>
    </div>
  </div>
</section>

<footer>
  <p>&copy; 2025 Customer Support System. All Rights Reserved.</p>
</footer>
</body>
</html>
